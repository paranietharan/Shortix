<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verification OTP</title>
</head>
<body style="margin:0;padding:0;background:#f6f7fb;font-family:Arial,sans-serif;color:#1f2937;">
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;background:#ffffff;border-radius:12px;padding:24px;">
          <tr><td style="font-size:24px;font-weight:700;padding-bottom:12px;">Verify your email</td></tr>
          <tr><td style="font-size:15px;line-height:1.6;padding-bottom:16px;">Use this OTP to verify your {{.AppName}} account:</td></tr>
          <tr><td style="font-size:28px;font-weight:700;letter-spacing:6px;background:#eef2ff;color:#111827;text-align:center;padding:14px;border-radius:8px;">{{.OTP}}</td></tr>
          <tr><td style="font-size:14px;line-height:1.6;padding-top:16px;">This code expires in {{.ExpiresInMinutes}} minutes.</td></tr>
          <tr><td style="font-size:13px;color:#6b7280;line-height:1.6;padding-top:16px;">If you did not create this account, you can ignore this email.</td></tr>
          <tr><td style="font-size:12px;color:#9ca3af;padding-top:24px;">&copy; {{.Year}} {{.AppName}}</td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
